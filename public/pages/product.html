<!DOCTYPE html>
<html lang="es">
<head>
  <!-- ============================================================
       PRODUCT.HTML - DETALLE DE PRODUCTO
       ============================================================
       Muestra la información completa de un producto individual.
       Lee el ID del producto desde la URL: ?id=42
       
       Incluye: imagen grande, nombre, precio, descripción,
       talla, color, stock disponible, selector de cantidad
       y botón "Agregar al carrito".
       
       Endpoint: GET /api/productos/:id
       ============================================================ -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Detalle de Producto - Ensigna </title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link href="/css/styles.css" rel="stylesheet">
</head>
<body>

  <div id="navbar-container"></div>

  <main class="container py-4">
    <!-- ============================================================
         DETALLE DEL PRODUCTO
         ============================================================
         Este div se llena completamente con JavaScript (catalog.js).
         La función initProductDetail() lee el ?id= de la URL,
         hace GET /api/productos/:id y renderiza todo el contenido.
         ============================================================ -->
    <div id="product-detail">
      <!-- Se carga dinámicamente con JavaScript -->
      <div class="text-center py-5">
        <div class="spinner-border text-primary" role="status">
          <span class="visually-hidden">Cargando producto...</span>
        </div>
      </div>
    </div>
  </main>

  <footer class="footer-custom">
    <div class="container">
      <p class="mb-0">&copy; 2024 ModaStore - Proyecto Educativo</p>
    </div>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="/js/utils.js"></script>
  <script src="/js/catalog.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      loadNavbar();
    });
  </script>
</body>
</html>
