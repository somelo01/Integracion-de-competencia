<!DOCTYPE html>
<html lang="es">
<head>
  <!-- ============================================================
       ORDER-DETAIL.HTML - DETALLE DE UN PEDIDO
       ============================================================
       Muestra toda la información de un pedido específico:
       - Datos generales (fecha, estado, total)
       - Tabla de productos comprados
       - Botón cancelar (si está Pendiente)
       - Botón solicitar reembolso (si está Pagado/Enviado/Entregado)
       
       Lee el ID del pedido desde la URL: ?id=42
       Endpoint: GET /api/pedidos/42
       
       REQUIERE AUTENTICACIÓN.
       ============================================================ -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Detalle del Pedido - Ensigna </title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link href="/css/styles.css" rel="stylesheet">
</head>
<body>

  <div id="navbar-container"></div>

  <main class="container py-4">
    <!-- ============================================================
         DETALLE DEL PEDIDO
         ============================================================
         Este div se llena completamente con JavaScript (orders.js).
         La función loadOrderDetail() lee el ?id= de la URL,
         hace GET /api/pedidos/:id y renderiza todo el contenido.
         ============================================================ -->
    <div id="order-detail">
      <div class="text-center py-5">
        <div class="spinner-border text-primary" role="status">
          <span class="visually-hidden">Cargando pedido...</span>
        </div>
      </div>
    </div>
  </main>

  <footer class="footer-custom">
    <div class="container">
      <p class="mb-0">&copy; 2026 Ensigna  - Proyecto Educativo</p>
    </div>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="/js/utils.js"></script>
  <script src="/js/orders.js"></script>
</body>
</html>
