<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>¡Pago Exitoso! - Tienda de Ropa</title>
  <!-- Bootstrap 5 CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="/css/styles.css">
</head>
<body>
  <!-- ============================================================
       PÁGINA: PAGO EXITOSO
       ============================================================
       Esta página se muestra después de que Webpay Plus aprueba
       un pago. El paymentController.js redirige aquí con:
         res.redirect('/pago-exitoso?pedido=ID')
       
       Corresponde al flujo "Pago aprobado" del Diagrama de
       Secuencia del Proceso de Compra (imagen 5):
         "Confirmación + comprobante" → Se muestra esta página
       
       FLUJO:
         1. paymentController.confirmarPago() recibe callback de Webpay
         2. Verifica que response_code === 0 (aprobado)
         3. Actualiza pago y pedido en BD
         4. Crea factura
         5. Redirige aquí con el ID del pedido como query param
       ============================================================ -->

  <!-- Navbar -->
  <div id="navbar-container"></div>

  <main class="container py-5">
    <div class="row justify-content-center">
      <div class="col-md-8 col-lg-6">
        <!-- Card de éxito -->
        <div class="card border-0 shadow text-center p-5">
          <!-- Icono de éxito animado -->
          <div class="mb-4">
            <i class="bi bi-check-circle-fill text-success" style="font-size: 5rem;"></i>
          </div>
          
          <h1 class="h2 mb-3 text-success">¡Pago Exitoso!</h1>
          
          <p class="lead text-muted mb-4">
            Tu pago ha sido procesado correctamente a través de Webpay Plus.
          </p>

          <!-- Número de pedido (se llena con JS) -->
          <div id="pedido-info" class="alert alert-light border mb-4" style="display: none;">
            <p class="mb-1 text-muted">Número de pedido:</p>
            <h3 class="mb-0 fw-bold" id="numero-pedido"></h3>
          </div>

          <p class="text-muted mb-4">
            <i class="bi bi-envelope-check me-1"></i>
            Recibirás una confirmación con los detalles de tu compra.
            Tu pedido será procesado y despachado a la brevedad.
          </p>

          <!-- Botones de acción -->
          <div class="d-grid gap-2">
            <a href="#" id="btn-ver-pedido" class="btn btn-primary btn-lg">
              <i class="bi bi-eye me-2"></i>Ver Detalle del Pedido
            </a>
            <a href="/pages/orders.html" class="btn btn-outline-secondary">
              <i class="bi bi-list-ul me-2"></i>Ver Todos mis Pedidos
            </a>
            <a href="/pages/catalog.html" class="btn btn-outline-primary">
              <i class="bi bi-shop me-2"></i>Seguir Comprando
            </a>
          </div>
        </div>
      </div>
    </div>
  </main>

  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="/js/utils.js"></script>
  <script>
    // ============================================================
    // LÓGICA DE LA PÁGINA DE PAGO EXITOSO
    // ============================================================
    document.addEventListener('DOMContentLoaded', () => {
      // Cargar el navbar
      loadNavbar();

      // Obtener el ID del pedido del query param
      // paymentController.js redirige con: /pago-exitoso?pedido=ID
      const idPedido = getQueryParam('pedido');

      if (idPedido) {
        // Mostrar el número de pedido
        document.getElementById('pedido-info').style.display = 'block';
        document.getElementById('numero-pedido').textContent = `#${idPedido}`;
        
        // Configurar el botón "Ver Detalle del Pedido"
        document.getElementById('btn-ver-pedido').href = `/pages/order-detail.html?id=${idPedido}`;
      } else {
        // Si no hay ID, ocultar el botón de detalle
        document.getElementById('btn-ver-pedido').style.display = 'none';
      }
    });
  </script>
</body>
</html>
