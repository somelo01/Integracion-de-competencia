<!DOCTYPE html>
<html lang="es">
<head>
  <!-- ============================================================
       RECOVER.HTML - RECUPERACIÓN DE CONTRASEÑA
       ============================================================
       Formulario simple para solicitar la recuperación de contraseña.
       El usuario ingresa su email y el backend envía instrucciones.
       
       Por SEGURIDAD, siempre mostramos el mismo mensaje de éxito
       sin importar si el email existe o no (para no revelar qué
       emails están registrados).
       
       Endpoint: POST /api/auth/recuperar
       Body: { email }
       ============================================================ -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Recuperar Contraseña - Ensigna </title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link href="/css/styles.css" rel="stylesheet">
</head>
<body>

  <div id="navbar-container"></div>

  <main class="container py-4">
    <div class="form-card">
      <h2><i class="bi bi-key me-2"></i>Recuperar Contraseña</h2>
      <p class="text-muted text-center mb-4">
        Ingresa tu correo electrónico y te enviaremos instrucciones para restablecer tu contraseña.
      </p>

      <!-- Contenedor de alertas -->
      <div id="recover-alerts"></div>

      <form id="recover-form" novalidate>
        <!-- Campo: Email -->
        <div class="mb-3">
          <label for="recover-email" class="form-label">
            <i class="bi bi-envelope me-1"></i>Correo electrónico
          </label>
          <input type="email"
                 class="form-control"
                 id="recover-email"
                 placeholder="tu@correo.com"
                 required
                 autocomplete="email">
          <div class="validation-message"></div>
        </div>

        <!-- Botón de envío -->
        <button type="submit" class="btn btn-primary w-100 mb-3">
          <i class="bi bi-send me-1"></i>Enviar instrucciones
        </button>

        <!-- Links de navegación -->
        <div class="text-center">
          <p class="mb-1">
            <a href="/pages/login.html">
              <i class="bi bi-arrow-left me-1"></i>Volver al login
            </a>
          </p>
          <p>
            ¿No tienes cuenta?
            <a href="/pages/register.html" class="fw-bold">Regístrate aquí</a>
          </p>
        </div>
      </form>
    </div>
  </main>

  <footer class="footer-custom">
    <div class="container">
      <p class="mb-0">&copy; 2026 Ensigna - Proyecto Educativo</p>
    </div>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="/js/utils.js"></script>
  <script src="/js/auth.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      loadNavbar();
    });
  </script>
</body>
</html>
