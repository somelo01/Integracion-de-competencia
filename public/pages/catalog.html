<!DOCTYPE html>
<html lang="es">
<head>
  <!-- Página de catálogo con búsqueda, filtros y paginación. -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Catálogo - Ensigna </title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link href="/css/styles.css" rel="stylesheet">
</head>
<body class="modo-claro">
  
  <div id="navbar-container"></div>

  <main class="container py-4">
    <!-- Título de la página -->
    <h2 class="mb-4">
      <i class="bi bi-grid me-2"></i>Catálogo de Productos
    </h2>

    <!-- Barra de búsqueda con debounce -->
    <div class="row mb-4">
      <div class="col-md-8 mx-auto">
        <div class="input-group">
          <span class="input-group-text bg-white">
            <i class="bi bi-search"></i>
          </span>
          <input type="text"
                 class="form-control"
                 id="search-input"
                 placeholder="Buscar productos por nombre, categoría..."
                 autocomplete="off">
        </div>
      </div>
    </div>


    <div class="row">
      <!-- Sidebar de filtros para el catálogo -->
      <div class="col-md-3 mb-4">
        <div class="filter-sidebar">
          <h5><i class="bi bi-funnel me-2"></i>Filtros</h5>

          <!-- Filtro: Categoría -->
          <div class="mb-3">
            <label for="filter-category" class="form-label fw-bold">Categoría</label>
            <select class="form-select" id="filter-category">
              <option value="">Todas las categorías</option>
              <!-- Las opciones se cargan dinámicamente con loadCategories() -->
            </select>
          </div>

          <!-- Filtro: Rango de precio -->
          <div class="mb-3">
            <label class="form-label fw-bold">Precio</label>
            <div class="row g-2">
              <div class="col-6">
                <input type="number"
                       class="form-control form-control-sm"
                       id="filter-price-min"
                       placeholder="Mín"
                       min="0">
              </div>
              <div class="col-6">
                <input type="number"
                       class="form-control form-control-sm"
                       id="filter-price-max"
                       placeholder="Máx"
                       min="0">
              </div>
            </div>
          </div>

          <!-- Filtro: Talla -->
          <div class="mb-3">
            <label for="filter-size" class="form-label fw-bold">Talla</label>
            <select class="form-select" id="filter-size">
              <option value="">Todas las tallas</option>
              <option value="XS">XS</option>
              <option value="S">S</option>
              <option value="M">M</option>
              <option value="L">L</option>
              <option value="XL">XL</option>
              <option value="XXL">XXL</option>
            </select>
          </div>

          <!-- Filtro: Color -->
          <div class="mb-3">
            <label for="filter-color" class="form-label fw-bold">Color</label>
            <select class="form-select" id="filter-color">
              <option value="">Todos los colores</option>
              <option value="Negro">Negro</option>
              <option value="Blanco">Blanco</option>
              <option value="Azul">Azul</option>
              <option value="Rojo">Rojo</option>
              <option value="Verde">Verde</option>
              <option value="Gris">Gris</option>
              <option value="Café">Café</option>
              <option value="Rosado">Rosado</option>
            </select>
          </div>

          <!-- Botones de filtro -->
          <button class="btn btn-primary w-100 mb-2" id="btn-apply-filters">
            <i class="bi bi-funnel me-1"></i>Aplicar Filtros
          </button>
          <button class="btn btn-outline-secondary w-100" id="btn-clear-filters">
            <i class="bi bi-x-circle me-1"></i>Limpiar Filtros
          </button>
        </div>
      </div>

      <!-- Grid de productos renderizado por JS -->
      <div class="col-md-9">
        <!-- Grid de productos (se llena con JavaScript) -->
        <div class="row" id="product-grid">
          <div class="col-12 text-center py-5">
            <div class="spinner-border text-primary" role="status">
              <span class="visually-hidden">Cargando productos...</span>
            </div>
          </div>
        </div>

        <!-- Paginación (se genera con JavaScript) -->
        <div id="pagination-container" class="mt-4"></div>
      </div>
    </div>
  </main>

  <footer class="footer-custom">
    <div class="container">
      <p class="mb-0">&copy; 2026 Ensigna - Proyecto Educativo</p>
    </div>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="/js/utils.js"></script>
  <script src="/js/catalog.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      loadNavbar();
    });
  </script>
</body>
</html>
