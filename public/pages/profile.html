<!DOCTYPE html>
<html lang="es">
<head>
  <!-- ============================================================
       PROFILE.HTML - EDITAR PERFIL DE USUARIO
       ============================================================
       Permite al usuario ver y modificar sus datos personales:
       - Email (solo lectura, no se puede cambiar)
       - Nombre (editable con validación regex)
       - Contraseña (opcional, requiere la contraseña actual)
       
       REQUIERE AUTENTICACIÓN.
       
       Endpoints:
         GET /api/auth/perfil → cargar datos actuales
         PUT /api/auth/perfil → guardar cambios
       Body: { nombre, contrasena_actual, contrasena_nueva }
       ============================================================ -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mi Perfil - Ensigna </title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link href="/css/styles.css" rel="stylesheet">
</head>
<body>

  <div id="navbar-container"></div>

  <main class="container py-4">
    <div class="form-card" style="max-width: 600px;">
      <h2><i class="bi bi-person-circle me-2"></i>Mi Perfil</h2>

      <!-- Contenedor de alertas -->
      <div id="profile-alerts"></div>

      <form id="profile-form" novalidate>
        <!-- Campo: Email (solo lectura) -->
        <div class="mb-3">
          <label for="profile-email" class="form-label">
            <i class="bi bi-envelope me-1"></i>Correo electrónico
          </label>
          <input type="email"
                 class="form-control"
                 id="profile-email"
                 disabled
                 readonly>
          <!-- disabled + readonly: el campo se muestra pero no se puede editar.
               El email no se puede cambiar por seguridad. -->
          <small class="text-muted">El email no se puede modificar.</small>
        </div>

        <!-- Campo: Nombre -->
        <div class="mb-3">
          <label for="profile-name" class="form-label">
            <i class="bi bi-person me-1"></i>Nombre completo
          </label>
          <input type="text"
                 class="form-control"
                 id="profile-name"
                 placeholder="Tu nombre"
                 required>
          <div class="validation-message"></div>
          <small class="text-muted">Solo letras y espacios, 2-100 caracteres.</small>
        </div>

        <!-- Separador visual -->
        <hr class="my-4">
        <h5 class="mb-3">
          <i class="bi bi-shield-lock me-2"></i>Cambiar Contraseña
          <small class="text-muted fw-normal">(opcional)</small>
        </h5>

        <!-- Campo: Contraseña actual -->
        <div class="mb-3">
          <label for="profile-current-password" class="form-label">
            Contraseña actual
          </label>
          <input type="password"
                 class="form-control"
                 id="profile-current-password"
                 placeholder="Solo si quieres cambiarla"
                 autocomplete="current-password">
          <small class="text-muted">Requerida solo si deseas cambiar tu contraseña.</small>
        </div>

        <!-- Campo: Nueva contraseña -->
        <div class="mb-3">
          <label for="profile-new-password" class="form-label">
            Nueva contraseña
          </label>
          <input type="password"
                 class="form-control"
                 id="profile-new-password"
                 placeholder="Mínimo 8 caracteres"
                 autocomplete="new-password">
          <div class="validation-message"></div>

          <!-- Barra de fortaleza -->
          <div class="password-strength-bar">
            <div class="strength-fill"></div>
          </div>
          <div class="password-strength-text"></div>

          <small class="text-muted">
            1 mayúscula, 1 minúscula, 1 número y 1 carácter especial (@$!%*?&#)
          </small>
        </div>

        <!-- Botón guardar -->
        <button type="submit" class="btn btn-primary w-100">
          <i class="bi bi-check-circle me-1"></i>Guardar Cambios
        </button>
      </form>
    </div>
  </main>

  <footer class="footer-custom">
    <div class="container">
      <p class="mb-0">&copy; 2026 Ensigna - Proyecto Educativo</p>
    </div>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="/js/utils.js"></script>
  <script src="/js/auth.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', async () => {
      // Verificar autenticación antes de cargar el perfil
      const user = await redirectIfNotAuth();
      if (!user) return;
      loadNavbar();
    });
  </script>
</body>
</html>
