<!DOCTYPE html>
<html lang="es">
<head>
  <!-- Panel admin con estadísticas generales del sistema. -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Panel Admin - Ensigna </title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link href="/css/styles.css" rel="stylesheet">
</head>
<body>

  <div id="navbar-container"></div>

  <main class="container py-4" id="admin-dashboard">
    <h2 class="mb-4">
      <i class="bi bi-speedometer2 me-2"></i>Panel de Administración
    </h2>

    <!-- Contenedor de alertas -->
    <div id="dashboard-alerts"></div>

    <!-- Tarjetas de estadísticas actualizadas por admin.js -->
    <div class="row mb-4">
      <!-- Tarjeta: Total de Productos -->
      <div class="col-md-4 col-6 mb-3">
        <div class="card stat-card text-white bg-primary">
          <div class="card-body d-flex justify-content-between align-items-center">
            <div>
              <div class="stat-number" id="stat-products">-</div>
              <div class="stat-label">Productos</div>
            </div>
            <i class="bi bi-box-seam stat-icon"></i>
          </div>
        </div>
      </div>

      <!-- Tarjeta: Total de Pedidos -->
      <div class="col-md-4 col-6 mb-3">
        <div class="card stat-card text-white bg-success">
          <div class="card-body d-flex justify-content-between align-items-center">
            <div>
              <div class="stat-number" id="stat-orders">-</div>
              <div class="stat-label">Pedidos</div>
            </div>
            <i class="bi bi-bag stat-icon"></i>
          </div>
        </div>
      </div>

      <!-- Tarjeta: Total de Usuarios -->
      <div class="col-md-4 col-6 mb-3">
        <div class="card stat-card text-white bg-info">
          <div class="card-body d-flex justify-content-between align-items-center">
            <div>
              <div class="stat-number" id="stat-users">-</div>
              <div class="stat-label">Usuarios</div>
            </div>
            <i class="bi bi-people stat-icon"></i>
          </div>
        </div>
      </div>

      <!-- Tarjeta: Total de Tickets -->
      <div class="col-md-4 col-6 mb-3">
        <div class="card stat-card text-white bg-secondary">
          <div class="card-body d-flex justify-content-between align-items-center">
            <div>
              <div class="stat-number" id="stat-tickets">-</div>
              <div class="stat-label">Tickets</div>
            </div>
            <i class="bi bi-chat-dots stat-icon"></i>
          </div>
        </div>
      </div>

      <!-- Tarjeta: Pedidos Pendientes (requieren atención) -->
      <div class="col-md-4 col-6 mb-3">
        <div class="card stat-card text-dark bg-warning">
          <div class="card-body d-flex justify-content-between align-items-center">
            <div>
              <div class="stat-number" id="stat-pending-orders">-</div>
              <div class="stat-label">Pedidos Pendientes</div>
            </div>
            <i class="bi bi-clock-history stat-icon"></i>
          </div>
        </div>
      </div>

      <!-- Tarjeta: Tickets Abiertos -->
      <div class="col-md-4 col-6 mb-3">
        <div class="card stat-card text-white bg-danger">
          <div class="card-body d-flex justify-content-between align-items-center">
            <div>
              <div class="stat-number" id="stat-open-tickets">-</div>
              <div class="stat-label">Tickets Abiertos</div>
            </div>
            <i class="bi bi-exclamation-circle stat-icon"></i>
          </div>
        </div>
      </div>
    </div>

    <!-- Accesos rápidos a secciones admin -->
    <h4 class="mb-3">
      <i class="bi bi-lightning me-2"></i>Accesos Rápidos
    </h4>
    <div class="row">
      <div class="col-md-3 col-6 mb-3">
        <a href="/pages/admin/products.html" class="btn btn-outline-primary w-100 py-3">
          <i class="bi bi-box-seam d-block mb-1" style="font-size: 1.5rem;"></i>
          Gestionar Productos
        </a>
      </div>
      <div class="col-md-3 col-6 mb-3">
        <a href="/pages/admin/orders.html" class="btn btn-outline-success w-100 py-3">
          <i class="bi bi-bag d-block mb-1" style="font-size: 1.5rem;"></i>
          Gestionar Pedidos
        </a>
      </div>
      <div class="col-md-3 col-6 mb-3">
        <a href="/pages/admin/users.html" class="btn btn-outline-info w-100 py-3">
          <i class="bi bi-people d-block mb-1" style="font-size: 1.5rem;"></i>
          Gestionar Usuarios
        </a>
      </div>
      <div class="col-md-3 col-6 mb-3">
        <a href="/pages/admin/support.html" class="btn btn-outline-danger w-100 py-3">
          <i class="bi bi-headset d-block mb-1" style="font-size: 1.5rem;"></i>
          Gestionar Soporte
        </a>
      </div>
    </div>
  </main>

  <footer class="footer-custom">
    <div class="container">
      <p class="mb-0">&copy; 2026 Ensigna  - Panel de Administración</p>
    </div>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="/js/utils.js"></script>
  <script src="/js/admin.js"></script>
</body>
</html>
