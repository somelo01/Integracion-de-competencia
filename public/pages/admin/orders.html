<!DOCTYPE html>
<html lang="es">
<head>
  <!-- Página admin de pedidos con filtro de estado y detalles. -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gestión de Pedidos - Admin</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link href="/css/styles.css" rel="stylesheet">
</head>
<body>

  <div id="navbar-container"></div>

  <main class="container py-4" id="admin-orders">
    <h2 class="mb-4">
      <i class="bi bi-bag me-2"></i>Gestión de Pedidos
    </h2>

    <!-- Breadcrumb -->
    <nav aria-label="breadcrumb" class="mb-3">
      <ol class="breadcrumb">
        <li class="breadcrumb-item">
          <a href="/pages/admin/dashboard.html">
            <i class="bi bi-speedometer2 me-1"></i>Dashboard
          </a>
        </li>
        <li class="breadcrumb-item active">Pedidos</li>
      </ol>
    </nav>

    <!-- Contenedor de alertas -->
    <div id="admin-orders-alerts"></div>

    <!-- Filtro por estado para los pedidos admin -->
    <div class="row mb-3">
      <div class="col-md-4">
        <label for="order-status-filter" class="form-label fw-bold">
          <i class="bi bi-funnel me-1"></i>Filtrar por estado:
        </label>
        <select class="form-select" id="order-status-filter">
          <option value="">Todos los estados</option>
          <option value="Pendiente">Pendiente</option>
          <option value="Pagado">Pagado</option>
          <option value="Enviado">Enviado</option>
          <option value="Entregado">Entregado</option>
          <option value="Cancelado">Cancelado</option>
        </select>
      </div>
    </div>

    <!-- Tabla de pedidos administrada por admin.js -->
    <div class="table-responsive">
      <table class="table table-hover table-admin align-middle">
        <thead class="table-dark">
          <tr>
            <th>Pedido</th>
            <th>Cliente</th>
            <th>Fecha</th>
            <th>Estado</th>
            <th>Total</th>
            <th>Cambiar Estado</th>
            <th>Acción</th>
          </tr>
        </thead>
        <tbody id="admin-orders-body">
          <!-- Se carga dinámicamente con admin.js -->
        </tbody>
      </table>
    </div>
  </main>

  <footer class="footer-custom">
    <div class="container">
      <p class="mb-0">&copy; 2026 Ensigna - Panel de Administración</p>
    </div>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="/js/utils.js"></script>
  <script src="/js/admin.js"></script>
</body>
</html>
