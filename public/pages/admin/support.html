<!DOCTYPE html>
<html lang="es">
<head>
  <!-- Admin soporte: lista tickets y responde desde modal. -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gestión de Soporte - Admin</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link href="/css/styles.css" rel="stylesheet">
</head>
<body>

  <div id="navbar-container"></div>

  <main class="container py-4" id="admin-support">
    <h2 class="mb-4">
      <i class="bi bi-headset me-2"></i>Gestión de Soporte
    </h2>

    <!-- Breadcrumb -->
    <nav aria-label="breadcrumb" class="mb-3">
      <ol class="breadcrumb">
        <li class="breadcrumb-item">
          <a href="/pages/admin/dashboard.html">
            <i class="bi bi-speedometer2 me-1"></i>Dashboard
          </a>
        </li>
        <li class="breadcrumb-item active">Soporte</li>
      </ol>
    </nav>

    <!-- Contenedor de alertas -->
    <div id="admin-support-alerts"></div>

    <!-- Tabla de tickets cargada por admin.js -->
    <div class="table-responsive">
      <table class="table table-hover table-admin align-middle">
        <thead class="table-dark">
          <tr>
            <th>ID</th>
            <th>Usuario</th>
            <th>Asunto</th>
            <th>Tipo</th>
            <th>Estado</th>
            <th>Fecha</th>
            <th>Acciones</th>
          </tr>
        </thead>
        <tbody id="admin-tickets-body">
          <!-- Se carga dinámicamente con admin.js -->
        </tbody>
      </table>
    </div>
  </main>

  <!-- Modal de respuesta a ticket admin -->
  <div class="modal fade" id="respondModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog">
      <div class="modal-content">
        <div class="modal-header bg-primary text-white">
          <h5 class="modal-title">
            <i class="bi bi-reply me-2"></i>Responder Ticket
          </h5>
          <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body">
          <!-- Alertas dentro del modal -->
          <div id="respond-alerts"></div>

          <!-- Información del ticket que se está respondiendo -->
          <p class="fw-bold" id="respond-ticket-asunto">Ticket #X: Asunto</p>

          <form id="respond-form" novalidate>
            <!-- ID oculto del ticket -->
            <input type="hidden" id="respond-ticket-id">

            <!-- Respuesta del admin -->
            <div class="mb-3">
              <label for="respond-message" class="form-label">Tu respuesta</label>
              <textarea class="form-control" id="respond-message" rows="4"
                        placeholder="Escribe tu respuesta al usuario..." required></textarea>
            </div>

            <!-- Nuevo estado del ticket -->
            <div class="mb-3">
              <label for="respond-status" class="form-label">Cambiar estado a:</label>
              <select class="form-select" id="respond-status">
                <option value="En Proceso">En Proceso</option>
                <option value="Resuelto">Resuelto</option>
                <option value="Cerrado">Cerrado</option>
              </select>
            </div>

            <!-- Botones -->
            <div class="d-flex justify-content-end gap-2">
              <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">
                Cancelar
              </button>
              <button type="submit" class="btn btn-primary">
                <i class="bi bi-send me-1"></i>Enviar Respuesta
              </button>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>

  <footer class="footer-custom">
    <div class="container">
      <p class="mb-0">&copy; 2026 Ensigna - Panel de Administración</p>
    </div>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="/js/utils.js"></script>
  <script src="/js/admin.js"></script>
</body>
</html>
